<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Pairing</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1020;
        color: #e6ebff;
      }

      .wrap {
        max-width: 720px;
        margin: 40px auto;
        padding: 20px;
      }

      .card {
        background: #141b34;
        border: 1px solid #273056;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      h1 {
        margin-top: 0;
        font-size: 1.5rem;
      }

      p {
        opacity: 0.9;
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      input,
      button {
        border-radius: 10px;
        border: 1px solid #34406f;
        background: #0f1530;
        color: #e6ebff;
        padding: 11px 12px;
        font-size: 0.95rem;
      }

      input {
        flex: 1;
        min-width: 240px;
      }

      button {
        cursor: pointer;
        background: #3857ff;
        border-color: #3857ff;
        font-weight: 600;
      }

      button.secondary {
        background: #1d274a;
        border-color: #34406f;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .section {
        margin-top: 18px;
      }

      .code {
        margin-top: 10px;
        padding: 12px;
        background: #0f1530;
        border: 1px dashed #34406f;
        border-radius: 10px;
        font-size: 1.1rem;
        letter-spacing: 0.04em;
      }

      .meta {
        margin-top: 6px;
        font-size: 0.88rem;
        color: #b7c0e8;
      }

      .qr-box {
        margin-top: 10px;
        display: inline-block;
        padding: 12px;
        background: #fff;
        border-radius: 10px;
      }

      .qr-box img {
        width: 260px;
        height: 260px;
        display: block;
      }

      .status {
        margin-top: 14px;
        font-size: 0.9rem;
        color: #b7c0e8;
        white-space: pre-wrap;
      }

      .err {
        color: #ff9f9f;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>WhatsApp Pairing</h1>
        <p>Enter a number for pairing code, or generate QR directly.</p>

        <div class="row">
          <input
            id="phone"
            placeholder="e.g. 2348012345678"
            autocomplete="off"
          />
          <button id="pairBtn">Get Pair Code</button>
          <button id="qrBtn" class="secondary">Get QR</button>
        </div>

        <div class="section" id="pairSection" hidden>
          <strong>Pair Code</strong>
          <div class="code" id="pairCode"></div>
          <div class="meta" id="pairMeta"></div>
        </div>

        <div class="section" id="qrSection" hidden>
          <strong>Scan QR</strong>
          <div class="qr-box"><img id="qrImage" alt="WhatsApp QR" /></div>
          <div class="meta" id="qrMeta"></div>
        </div>

        <div class="status" id="status"></div>
      </div>
    </div>

    <script>
      const phoneInput = document.getElementById("phone");
      const pairBtn = document.getElementById("pairBtn");
      const qrBtn = document.getElementById("qrBtn");

      const pairSection = document.getElementById("pairSection");
      const pairCode = document.getElementById("pairCode");
      const pairMeta = document.getElementById("pairMeta");

      const qrSection = document.getElementById("qrSection");
      const qrImage = document.getElementById("qrImage");
      const qrMeta = document.getElementById("qrMeta");

      const statusEl = document.getElementById("status");

      function setLoading(loading) {
        pairBtn.disabled = loading;
        qrBtn.disabled = loading;
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message || "";
        statusEl.classList.toggle("err", Boolean(isError));
      }

      function resetViews() {
        pairSection.hidden = true;
        qrSection.hidden = true;
      }

      async function requestJson(url) {
        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg = data?.error || data?.message || `Request failed (${res.status})`;
          throw new Error(msg);
        }
        return data;
      }

      pairBtn.addEventListener("click", async () => {
        const phone = (phoneInput.value || "").replace(/\D/g, "");
        if (!phone) {
          setStatus("Enter a valid phone number first.", true);
          return;
        }

        resetViews();
        setLoading(true);
        setStatus("Requesting pairing code...");

        try {
          const data = await requestJson(`/whatsapp?number=${encodeURIComponent(phone)}`);
          pairSection.hidden = false;
          pairCode.textContent = data.code || "No code returned yet";
          pairMeta.textContent = `id: ${data.id || "-"} | sessionId: ${data.sessionId || "-"}`;
          setStatus("Pair code generated. Complete pairing in WhatsApp.");
        } catch (err) {
          setStatus(err.message, true);
        } finally {
          setLoading(false);
        }
      });

      qrBtn.addEventListener("click", async () => {
        resetViews();
        setLoading(true);
        setStatus("Generating QR code...");

        try {
          const data = await requestJson("/whatsapp/qr");
          if (!data.qr) throw new Error("QR image was not returned");

          qrSection.hidden = false;
          qrImage.src = data.qr;
          qrMeta.textContent = `id: ${data.id || "-"} | sessionId: ${data.sessionId || "-"}`;
          setStatus("Scan the QR with WhatsApp.");
        } catch (err) {
          setStatus(err.message, true);
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
